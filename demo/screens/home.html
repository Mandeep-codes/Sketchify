<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 393px; height: 852px; overflow: hidden;
    background: #0A0A0A;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    color: #fff;
  }

  .statusbar {
    height: 44px; display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px 0;
  }
  .time { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .icons { font-size: 12px; color: rgba(255,255,255,0.9); }

  /* hero section */
  .hero {
    margin: 12px 16px 0;
    border-radius: 24px; overflow: hidden;
    height: 220px; position: relative;
    background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
  }
  .hero-bg {
    position: absolute; inset: 0;
    background-image: url('../welcome-hero.png');
    background-size: cover; background-position: center;
    opacity: 0.7;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.8) 100%);
  }
  .hero-content {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 20px;
  }
  .hero-greeting { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
  .hero-name { font-size: 22px; font-weight: 800; }
  .hero-stats { display: flex; gap: 16px; margin-top: 8px; }
  .hero-stat { text-align: center; }
  .hero-stat-num { font-size: 18px; font-weight: 800; color: #8CB33A; }
  .hero-stat-label { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; }

  .hero-cta {
    position: absolute; top: 16px; right: 16px;
    background: #8CB33A; border-radius: 12px;
    padding: 8px 16px;
    font-size: 13px; font-weight: 700; color: #0A0A0A;
  }

  /* section title */
  .section {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 20px 10px;
  }
  .section-title { font-size: 17px; font-weight: 800; }
  .section-more { font-size: 13px; color: #8CB33A; font-weight: 600; }

  /* daily challenge card */
  .challenge-card {
    margin: 0 16px;
    border-radius: 20px; overflow: hidden;
    background: linear-gradient(135deg, #1B3A12, #2D5A1A);
    padding: 20px;
    display: flex; align-items: center; gap: 16px;
    border: 1px solid rgba(140,179,58,0.25);
  }
  .challenge-icon {
    width: 72px; height: 72px; border-radius: 16px;
    background: rgba(140,179,58,0.15);
    border: 2px solid rgba(140,179,58,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; flex-shrink: 0;
  }
  .challenge-content { flex: 1; }
  .challenge-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(140,179,58,0.2); border-radius: 20px;
    padding: 3px 10px; margin-bottom: 6px;
  }
  .challenge-dot { width: 6px; height: 6px; border-radius: 50%; background: #8CB33A; }
  .challenge-badge-text { font-size: 10px; font-weight: 700; color: #8CB33A; letter-spacing: 1.5px; text-transform: uppercase; }
  .challenge-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .challenge-desc { font-size: 13px; color: rgba(255,255,255,0.6); }
  .challenge-timer { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 8px; }

  /* creation grid */
  .grid { display: flex; gap: 10px; padding: 0 16px; overflow-x: hidden; }
  .grid-item {
    width: 110px; height: 110px; flex-shrink: 0;
    border-radius: 14px; overflow: hidden;
    background: #1a1a1a; position: relative;
  }
  .grid-item img { width: 100%; height: 100%; object-fit: cover; }
  .grid-item-tag {
    position: absolute; bottom: 6px; left: 6px;
    background: rgba(0,0,0,0.7); border-radius: 6px;
    padding: 2px 7px; font-size: 10px; font-weight: 600;
    color: rgba(255,255,255,0.9);
  }

  /* tab bar */
  .tabbar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 82px; background: rgba(10,10,10,0.95);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 10px;
  }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .tab-icon { font-size: 20px; }
  .tab-label { font-size: 10px; color: rgba(255,255,255,0.4); }
  .tab.active .tab-label { color: #8CB33A; }
  .tab-dot { width: 4px; height: 4px; border-radius: 50%; background: #8CB33A; }
</style>
</head>
<body>
  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="icons">●●● WiFi 87%</span>
  </div>

  <!-- hero -->
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-greeting">Good morning</div>
      <div class="hero-name">Artist</div>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-num">12</div>
          <div class="hero-stat-label">created</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-num">7</div>
          <div class="hero-stat-label">streak</div>
        </div>
      </div>
    </div>
    <div class="hero-cta">Draw Now</div>
  </div>

  <!-- daily challenge -->
  <div class="section">
    <span class="section-title">Daily Challenge</span>
    <span class="section-more">View all</span>
  </div>

  <div class="challenge-card">
    <div class="challenge-icon">🌆</div>
    <div class="challenge-content">
      <div class="challenge-badge">
        <div class="challenge-dot"></div>
        <span class="challenge-badge-text">Live Now</span>
      </div>
      <div class="challenge-title">City at Sunset</div>
      <div class="challenge-desc">Urban skyline, golden hour vibes</div>
      <div class="challenge-timer">Resets in 4h 22m</div>
    </div>
  </div>

  <!-- recent creations -->
  <div class="section">
    <span class="section-title">Recent</span>
    <span class="section-more">Gallery</span>
  </div>

  <div class="grid">
    <div class="grid-item">
      <img src="../preview-anime.png">
      <div class="grid-item-tag">Anime</div>
    </div>
    <div class="grid-item">
      <img src="../preview-cyberpunk.png">
      <div class="grid-item-tag">Cyberpunk</div>
    </div>
    <div class="grid-item">
      <img src="../preview-oilpaint.png">
      <div class="grid-item-tag">Oil Paint</div>
    </div>
  </div>

  <!-- tab bar -->
  <div class="tabbar">
    <div class="tab active">
      <div class="tab-icon">⌂</div>
      <div class="tab-label">Home</div>
      <div class="tab-dot"></div>
    </div>
    <div class="tab">
      <div class="tab-icon">✎</div>
      <div class="tab-label">Draw</div>
    </div>
    <div class="tab">
      <div class="tab-icon">◎</div>
      <div class="tab-label">Challenge</div>
    </div>
    <div class="tab">
      <div class="tab-icon">☻</div>
      <div class="tab-label">Profile</div>
    </div>
  </div>
</body>
</html>
