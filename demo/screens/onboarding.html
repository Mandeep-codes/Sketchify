<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 393px; height: 852px; overflow: hidden;
    background: #0A0A0A;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    position: relative;
  }

  .hero {
    position: absolute; inset: 0;
    background-image: url('../welcome-hero.png');
    background-size: cover; background-position: center top;
  }
  .hero::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.0) 40%, rgba(10,10,10,0.85) 70%, #0A0A0A 100%);
  }

  .bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0 28px 52px;
  }

  .tagline {
    font-size: 13px; font-weight: 600; letter-spacing: 3px;
    color: #8CB33A; text-transform: uppercase;
    margin-bottom: 10px;
  }

  .title {
    font-size: 38px; font-weight: 900; line-height: 1.05;
    color: #FFFFFF; margin-bottom: 10px;
    letter-spacing: -1px;
  }
  .title span { color: #8CB33A; }

  .sub {
    font-size: 15px; color: rgba(255,255,255,0.55);
    margin-bottom: 36px; line-height: 1.5;
    font-weight: 400;
  }

  .cta {
    display: flex; align-items: center; justify-content: center;
    background: #8CB33A;
    border-radius: 16px;
    height: 58px;
    font-size: 17px; font-weight: 700;
    color: #0A0A0A;
    letter-spacing: 0.3px;
    position: relative; overflow: hidden;
  }

  .dots {
    display: flex; gap: 7px; justify-content: center;
    margin-top: 22px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  .dot.active { background: #8CB33A; width: 22px; border-radius: 4px; }

  /* status bar */
  .statusbar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 44px; display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px 0;
    z-index: 10;
  }
  .time { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .icons { display: flex; gap: 6px; align-items: center; }
  .icons span { font-size: 12px; color: rgba(255,255,255,0.9); }

  /* slide indicators top */
  .slide-progress {
    position: absolute; top: 50px; left: 0; right: 0;
    display: flex; gap: 4px; padding: 0 20px;
    z-index: 10;
  }
  .sp { flex: 1; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.25); }
  .sp.done { background: #8CB33A; }
  .sp.active { background: rgba(255,255,255,0.7); }
</style>
</head>
<body>
  <div class="statusbar">
    <span class="time">9:41</span>
    <div class="icons">
      <span>●●●</span>
      <span>WiFi</span>
      <span>100%</span>
    </div>
  </div>

  <div class="hero"></div>

  <div class="bottom">
    <div class="tagline">Sketchify</div>
    <div class="title">Draw it.<br><span>Make it real.</span></div>
    <div class="sub">Turn rough sketches into stunning AI art — in seconds.</div>
    <div class="cta">Start Creating</div>
    <div class="dots">
      <div class="dot done"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
