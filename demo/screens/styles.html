<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 393px; height: 852px; overflow: hidden;
    background: #0A0A0A;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    color: #fff;
  }

  .statusbar {
    height: 44px; display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px 0;
  }
  .time { font-size: 15px; font-weight: 600; }
  .icons { font-size: 12px; color: rgba(255,255,255,0.9); }

  .header {
    padding: 12px 20px 0;
    display: flex; align-items: center; gap: 12px;
  }
  .back {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .header-title { font-size: 18px; font-weight: 800; }

  /* original sketch */
  .sketch-row {
    padding: 16px 20px 8px;
    display: flex; align-items: center; gap: 12px;
  }
  .sketch-thumb {
    width: 60px; height: 60px; border-radius: 12px;
    border: 2px dashed rgba(255,255,255,0.2);
    background: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .sketch-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; filter: grayscale(100%); }
  .sketch-label { font-size: 13px; color: rgba(255,255,255,0.5); }
  .sketch-label strong { color: #fff; font-size: 15px; display: block; }

  /* section label */
  .section-label {
    padding: 4px 20px 12px;
    font-size: 13px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;
  }

  /* results grid */
  .results {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 0 16px;
  }
  .result-card {
    border-radius: 16px; overflow: hidden;
    position: relative; aspect-ratio: 3/4;
    cursor: pointer;
  }
  .result-card img { width: 100%; height: 100%; object-fit: cover; }
  .result-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 55%, rgba(0,0,0,0.85) 100%);
  }
  .result-tag {
    position: absolute; bottom: 10px; left: 10px; right: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .result-name { font-size: 13px; font-weight: 700; }
  .result-active {
    border: 2px solid #8CB33A;
  }
  .result-check {
    width: 22px; height: 22px; border-radius: 50%;
    background: #8CB33A;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  .save-btn {
    position: absolute; bottom: 90px; left: 20px; right: 20px;
    height: 56px; border-radius: 16px;
    background: #8CB33A;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700; color: #0A0A0A;
  }

  /* tab bar */
  .tabbar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 82px; background: rgba(10,10,10,0.95);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 10px;
  }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .tab-icon { font-size: 20px; }
  .tab-label { font-size: 10px; color: rgba(255,255,255,0.4); }
  .tab.active .tab-label { color: #8CB33A; }
  .tab-dot { width: 4px; height: 4px; border-radius: 50%; background: #8CB33A; }
</style>
</head>
<body>
  <div class="statusbar">
    <span class="time">9:41</span>
    <span class="icons">●●● WiFi 87%</span>
  </div>

  <div class="header">
    <div class="back">←</div>
    <div class="header-title">Choose a Style</div>
  </div>

  <div class="sketch-row">
    <div class="sketch-thumb">
      <img src="../preview-realistic.png">
    </div>
    <div class="sketch-label">
      <strong>Your sketch</strong>
      Ready to transform
    </div>
  </div>

  <div class="section-label">4 styles generated</div>

  <div class="results">
    <div class="result-card result-active">
      <img src="../preview-anime.png">
      <div class="result-overlay"></div>
      <div class="result-tag">
        <span class="result-name">Anime</span>
        <div class="result-check">✓</div>
      </div>
    </div>
    <div class="result-card">
      <img src="../preview-cyberpunk.png">
      <div class="result-overlay"></div>
      <div class="result-tag">
        <span class="result-name">Cyberpunk</span>
      </div>
    </div>
    <div class="result-card">
      <img src="../preview-oilpaint.png">
      <div class="result-overlay"></div>
      <div class="result-tag">
        <span class="result-name">Oil Paint</span>
      </div>
    </div>
    <div class="result-card">
      <img src="../preview-realistic.png">
      <div class="result-overlay"></div>
      <div class="result-tag">
        <span class="result-name">Realistic</span>
      </div>
    </div>
  </div>

  <div class="save-btn">Save to Gallery</div>

  <div class="tabbar">
    <div class="tab">
      <div class="tab-icon">⌂</div>
      <div class="tab-label">Home</div>
    </div>
    <div class="tab active">
      <div class="tab-icon">✎</div>
      <div class="tab-label">Draw</div>
      <div class="tab-dot"></div>
    </div>
    <div class="tab">
      <div class="tab-icon">◎</div>
      <div class="tab-label">Challenge</div>
    </div>
    <div class="tab">
      <div class="tab-icon">☻</div>
      <div class="tab-label">Profile</div>
    </div>
  </div>
</body>
</html>
